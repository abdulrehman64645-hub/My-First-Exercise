<!DOCTYPE html>
<html>
  <head>
  <style>
    div{
      display: inline-block;
      border: none;
      border-radius: 4px;
      box-shadow: 0 5px 10px rgba(55, 49, 49, 1);
      margin-right: 10px;
    }
    .img1{
      width: 200px;
      height: 200px;
    }
    .name , .desc ,.but{
      margin-left: 10px;
     
    }
    .name{
      margin-bottom: 5px;
      margin-top: 5px;
    }
    .desc{
      margin-top: 0;
      font-size: 12px;
      margin-bottom: 5px;
      color: rgb(127, 113, 113);
    }
    .but{
      margin-bottom: 5px;
      background-color: blue;
      color: white;
      padding-bottom: 5px;
      padding-top: 5px;
      padding-left: 10px;
      padding-right: 10px;
      border-radius: 4px;
      border: solid;
      border-width: 1px;
    }
    .but:hover{
      cursor: pointer;
      color:blue ;
      background-color: white;
      border: solid;
      border-width: 1px;
    }
    .but:active{
      opacity: 0.5;
    }

  </style>
  </head>
  <body>
    <div>
      <img class="img1" src="4_Image.jpg" >
      <p class="name">Oliver</p>
      <p class="desc">2 Mutual Friends</p>
      <button class="but">Add Friend</button>
    </div>
      <div>
      <img class="img1" src="download.jpg" >
      <p class="name">Oliver</p>
      <p class="desc">2 Mutual Friends</p>
      <button class="but">Add Friend</button>
    </div>
      <div>
      <img class="img1" src="download (1).jpg" >
      <p class="name">Oliver</p>
      <p class="desc">2 Mutual Friends</p>
      <button class="but">Add Friend</button>
    </div>
  </body>
</html>
