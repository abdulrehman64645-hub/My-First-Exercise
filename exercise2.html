<!DOCTYPE html>
<html>
  <head>
    <style>
  .cat{
   width: 30px;
   height: 30px;
    border-radius: 15px;
    object-fit:cover;
    object-position: center;
    text-align: left;
    margin-left:20px ;
    vertical-align: middle;
  }
  .search-bar{
   width: 200px;
   padding-left: 10px;
   padding-top: 10px;
   padding-bottom: 10px;
   border: none;
   border-radius: 10px;
   text-align: left;
   vertical-align: middle;
  }
  .button{
    
    border: none;
    background-color: blue;
    color: white;
    padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 10px;
    padding-top: 10px;
    border-radius: 30px;
    vertical-align: middle;
  }
  .button:hover{
    border: solid;
    border-width: 1px;
    border-color: blue;
    background-color: white;
    color: blue;
    cursor: pointer;
      padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 10px;
    padding-top: 10px;
    border-radius: 30px;
  }
  .button:active{
    opacity: 0.5;
  }
  div{
    display: inline-block;
    border: none;
    box-shadow: 0 1px 10px rgb(134, 127, 127);
    padding-bottom: 20px;
    padding-top: 20px;
    padding-left: 20px;
    padding-right: 20px;
    border-radius: 4px;
  }
</style>
  </head>
  <body>
    <div>
<img class="cat" src="4_Image.jpg" alt="">
<input class="search-bar" type="text" placeholder="What's Happening!"
>
<button class="button">
  Tweet
</button>
    </div>
  </body>
</html>
